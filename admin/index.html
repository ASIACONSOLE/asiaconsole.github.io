<!DOCTYPE html>
<html lang="tr">

<head>
    <script async type="application/javascript" src="https://news.google.com/swg/js/v1/swg-basic.js"></script>
    <script>
        (self.SWG_BASIC = self.SWG_BASIC || []).push(basicSubscriptions => {
            basicSubscriptions.init({
                type: "NewsArticle",
                isPartOfType: ["Product"],
                isPartOfProductId: "CAowocrFDA:openaccess",
                clientOptions: { theme: "light", lang: "tr" },
            });
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Girişi - AsiaConsole</title>
    <link rel="stylesheet" href="../css/admin.css">
    <script src="../js/firebase.js"></script>
    <script src="../js/main.js"></script>
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-box">
            <div class="admin-login-card">
                <div class="admin-login-logo">
                    <div class="admin-logo-icon">⚙️</div>
                    <h2>AsiaConsole Admin</h2>
                    <p>Yönetim paneline giriş yapın</p>
                </div>

                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="adminUser" placeholder="admin" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password">
                </div>

                <div id="loginError"
                    style="display:none; padding:0.75rem 1rem; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#ef4444; font-size:0.875rem; margin-bottom:1rem;">
                    ❌ Kullanıcı adı veya şifre hatalı.
                </div>

                <button id="loginBtn"
                    style="width:100%; padding:0.875rem; background:linear-gradient(135deg, #4f8ef7, #a855f7); border:none; border-radius:10px; color:white; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.25s; margin-bottom:1rem;">
                    🔑 Giriş Yap
                </button>



                <div style="text-align:center; margin-top:1.5rem;">
                    <a href="../index.html" style="color:#8b949e; font-size:0.85rem; text-decoration:none;">← Siteye
                        Dön</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init DB to ensure memory cache and cleanup logic is ready
        if (typeof DB !== 'undefined') DB.init();

        // If already logged in, go to dashboard
        const session = (typeof DB !== 'undefined') ? DB.get('admin_session') : localStorage.getItem('tc_admin_session');
        if (session) {
            window.location.href = 'dashboard.html';
        }

        function doLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            const errEl = document.getElementById('loginError');

            const savedPass = (typeof DB !== 'undefined') ? DB.get('admin_password') : localStorage.getItem('tc_admin_password');
            const isInitial = !savedPass;
            const targetPass = savedPass || 'admin123';

            if (user === 'admin' && pass === targetPass) {
                if (typeof DB !== 'undefined') {
                    DB.set('admin_session', { user: 'admin', time: Date.now() }, false);
                } else {
                    localStorage.setItem('tc_admin_session', JSON.stringify({ user: 'admin', time: Date.now() }));
                }

                if (isInitial) {
                    const newPass = prompt('⚠️ GÜVENLİK UYARISI: Henüz bir admin şifresi belirlemediniz. Lütfen yeni bir şifre giriniz:');
                    if (newPass && newPass.length >= 6) {
                        if (typeof DB !== 'undefined') {
                            DB.set('admin_password', newPass, false);
                        } else {
                            localStorage.setItem('tc_admin_password', newPass);
                        }
                        alert('✅ Şifreniz kaydedildi. Artık bu şifre ile giriş yapacaksınız.');
                    } else {
                        alert('❌ Şifre çok kısa veya iptal edildi. Varsayılan şifre aktif kalmaya devam edecek.');
                    }
                }

                window.location.href = 'dashboard.html';
            } else {
                errEl.style.display = 'block';
                document.getElementById('adminPass').value = '';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>

</html>
