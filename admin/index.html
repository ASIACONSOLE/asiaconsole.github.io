<!DOCTYPE html>
<html lang="tr">

<head>
    <script async type="application/javascript" src="https://news.google.com/swg/js/v1/swg-basic.js"></script>
    <script>
        (self.SWG_BASIC = self.SWG_BASIC || []).push(basicSubscriptions => {
            basicSubscriptions.init({
                type: "NewsArticle",
                isPartOfType: ["Product"],
                isPartOfProductId: "CAowocrFDA:openaccess",
                clientOptions: { theme: "light", lang: "tr" },
            });
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Girişi - AsiaConsole</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-box">
            <div class="admin-login-card">
                <div class="admin-login-logo">
                    <div class="admin-logo-icon">⚙️</div>
                    <h2>AsiaConsole Admin</h2>
                    <p>Yönetim paneline giriş yapın</p>
                </div>

                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="adminUser" placeholder="admin" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password">
                </div>

                <div id="loginError"
                    style="display:none; padding:0.75rem 1rem; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#ef4444; font-size:0.875rem; margin-bottom:1rem;">
                    ❌ Kullanıcı adı veya şifre hatalı.
                </div>

                <button id="loginBtn"
                    style="width:100%; padding:0.875rem; background:linear-gradient(135deg, #4f8ef7, #a855f7); border:none; border-radius:10px; color:white; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.25s; margin-bottom:1rem;">
                    🔑 Giriş Yap
                </button>

                <div style="text-align:center; margin-top:1.5rem;">
                    <a href="../index.html" style="color:#8b949e; font-size:0.85rem; text-decoration:none;">← Siteye
                        Dön</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/firebase.js"></script>
    <script>
        // If already logged in, go to dashboard
        if (localStorage.getItem('tc_admin_session')) {
            window.location.href = 'dashboard.html';
        }

        // SHA-256 hash helper (same as main.js)
        async function hashAdminPass(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + '_tc_admin_salt');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            const errEl = document.getElementById('loginError');
            const targetUser = 'ASIA';

            if (!user || !pass) {
                errEl.textContent = '⚠️ Lütfen kullanıcı adı ve şifre girin.';
                errEl.style.display = 'block';
                return;
            }

            const hashedInput = await hashAdminPass(pass);

            // 1. Try localStorage first (fastest)
            let savedHash = localStorage.getItem('tc_admin_password_hash');

            // 2. If not in localStorage, try Firebase
            if (!savedHash && typeof FirebaseDB !== 'undefined' && FirebaseDB._ready) {
                try {
                    const remote = await FirebaseDB.get('site_data', 'admin_config');
                    if (remote && remote.passwordHash) {
                        savedHash = remote.passwordHash;
                        // Cache locally for next time
                        localStorage.setItem('tc_admin_password_hash', savedHash);
                    }
                } catch (e) { console.warn('[Admin] Firebase read failed:', e); }
            }

            // 3. If still no hash anywhere, accept initial setup password
            if (!savedHash) {
                // First-time setup: default password is "AsiaAdmin2026!"
                const defaultHash = await hashAdminPass('AsiaAdmin2026!');
                if (String(user || '').toUpperCase() === targetUser && hashedInput === defaultHash) {
                    // Save to both localStorage and Firebase
                    localStorage.setItem('tc_admin_password_hash', defaultHash);
                    if (typeof FirebaseDB !== 'undefined') {
                        FirebaseDB.onReady(() => {
                            FirebaseDB.set('site_data', 'admin_config', {
                                passwordHash: defaultHash,
                                lastUpdated: Date.now()
                            });
                        });
                    }
                    localStorage.setItem('tc_admin_session', JSON.stringify({ user: targetUser, time: Date.now() }));
                    errEl.textContent = '✅ İlk kurulum şifresi ile giriş yapıldı. Lütfen Ayarlar bölümünden şifrenizi değiştirin!';
                    errEl.style.color = '#f59e0b';
                    errEl.style.background = 'rgba(245,158,11,0.1)';
                    errEl.style.borderColor = 'rgba(245,158,11,0.3)';
                    errEl.style.display = 'block';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                    return;
                } else {
                    errEl.textContent = '⚠️ İlk kurulum: Kullanıcı adı "ASIA", şifre "AsiaAdmin2026!" ile giriş yapın.';
                    errEl.style.display = 'block';
                    return;
                }
            }

            // Normal login: compare hashes
            if (String(user || '').toUpperCase() === targetUser && hashedInput === savedHash) {
                localStorage.setItem('tc_admin_session', JSON.stringify({ user: targetUser, time: Date.now() }));
                window.location.href = 'dashboard.html';
            } else {
                // Also check legacy plaintext password (backward compat)
                const legacyPass = localStorage.getItem('tc_admin_password');
                if (legacyPass && pass === legacyPass && String(user || '').toUpperCase() === targetUser) {
                    // Migrate to hash
                    localStorage.setItem('tc_admin_password_hash', hashedInput);
                    localStorage.removeItem('tc_admin_password');
                    if (typeof FirebaseDB !== 'undefined') {
                        FirebaseDB.onReady(() => {
                            FirebaseDB.set('site_data', 'admin_config', {
                                passwordHash: hashedInput,
                                lastUpdated: Date.now()
                            });
                        });
                    }
                    localStorage.setItem('tc_admin_session', JSON.stringify({ user: targetUser, time: Date.now() }));
                    window.location.href = 'dashboard.html';
                    return;
                }
                errEl.textContent = '❌ Kullanıcı adı veya şifre hatalı.';
                errEl.style.display = 'block';
                document.getElementById('adminPass').value = '';
            }
        }

        // Wait for Firebase to be ready before enabling login
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>

</body>

</html>
